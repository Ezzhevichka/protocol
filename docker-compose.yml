services:
  postgres:
    image: postgres:16
    container_name: steam-postgres
    restart: always
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: steam_auth_app
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: steam-redis
    restart: always
    ports:
      - "6379:6379"
